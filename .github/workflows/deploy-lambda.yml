name: Deploy Lambda

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  STACK_NAME: moyklass-mcp-stack

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build:lambdas

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v3

      - run: sam build --no-use-container

      - name: Clean up failed stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack is in ROLLBACK_COMPLETE — deleting before redeploy..."
            aws cloudformation delete-stack --stack-name ${{ env.STACK_NAME }}
            aws cloudformation wait stack-delete-complete --stack-name ${{ env.STACK_NAME }}
            echo "Stack deleted."
          fi

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name ${{ env.STACK_NAME }} \
            --s3-bucket ${{ secrets.SAM_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region ${{ env.AWS_REGION }} \
            --parameter-overrides \
              MoyKlassApiKey=${{ secrets.MOYKLASS_API_KEY }} \
              McpAuthToken=${{ secrets.MOYKLASS_MCP_AUTH_TOKEN }} \
              CrmApiUrl=${{ vars.MOYKLASS_API_URL || 'https://api.moyklass.com' }}

      - name: Smoke test
        run: |
          MCP_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='McpUrl'].OutputValue" \
            --output text)
          BASE_URL="${MCP_URL%/mcp}"
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' "$BASE_URL/oauth/resource-metadata")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED: GET /health returned $STATUS"
            exit 1
          fi
          echo "Smoke test passed: $STATUS"
